services:
  mongodb:
    image: mongo:7
    ports:
      - "27217:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6479:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "18005:18005"
    environment:
      PORT: "18005"
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/chanl-eval
      REDIS_URL: redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    ports:
      - "3010:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo-data:
