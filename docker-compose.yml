# Local dependencies only — run the Nest app on the host (see README).
# This avoids port 18005 conflicts with `pnpm start:dev` in packages/server.

services:
  mongodb:
    image: mongo:7
    ports:
      - "27217:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6479:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
